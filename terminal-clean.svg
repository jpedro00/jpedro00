<svg width="900" height="410" viewBox="0 0 900 410" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .green { fill: #39ff88; }
      .white { fill: #e6edf3; }
      .muted { fill: #8b949e; }

      .cursor {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }

      .bar-blue {
        animation: growBlue 1.2s ease-out forwards;
      }

      .bar-purple {
        animation: growPurple 1.4s ease-out forwards;
      }

      .bar-green {
        animation: growGreen 1.6s ease-out forwards;
      }

      .bar-orange {
        animation: growOrange 1.8s ease-out forwards;
      }

      @keyframes growBlue {
        from { width: 0; }
        to { width: 360px; }
      }

      @keyframes growPurple {
        from { width: 0; }
        to { width: 285px; }
      }

      @keyframes growGreen {
        from { width: 0; }
        to { width: 205px; }
      }

      @keyframes growOrange {
        from { width: 0; }
        to { width: 130px; }
      }
    </style>
  </defs>

  <rect x="0.5" y="0.5" width="899" height="409" rx="12" fill="#020617" stroke="#30363d"/>

  <rect x="0.5" y="0.5" width="899" height="36" rx="12" fill="#05070a" stroke="#30363d"/>
  <path d="M0 36H900" stroke="#30363d"/>

  <circle cx="24" cy="18" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="18" r="6" fill="#ffbd2e"/>
  <circle cx="68" cy="18" r="6" fill="#27c93f"/>

  <text x="370" y="23" class="mono muted" font-size="12">
    github-stats - João Pedro
  </text>

  <text x="32" y="78" class="mono green" font-size="16" font-weight="700">$ gh about</text>

  <text x="32" y="108" class="mono white" font-size="15" font-weight="700">
    Junior Full-Stack Developer at TironiTech.
  </text>

  <text x="32" y="134" class="mono white" font-size="15" font-weight="700">
    Building production systems with React, Node.js,
  </text>

  <text x="32" y="160" class="mono white" font-size="15" font-weight="700">
    APIs, databases, deploy and business logic.
  </text>

  <text x="32" y="212" class="mono green" font-size="16" font-weight="700">$ gh langs</text>

  <text x="32" y="242" class="mono white" font-size="15" font-weight="700">JavaScript</text>
  <rect x="180" y="231" width="430" height="9" rx="4.5" fill="#111827"/>
  <rect x="180" y="231" height="9" rx="4.5" fill="#3b82f6" class="bar-blue"/>
  <text x="635" y="242" class="mono muted" font-size="13">45%</text>

  <text x="32" y="270" class="mono white" font-size="15" font-weight="700">TypeScript</text>
  <rect x="180" y="259" width="430" height="9" rx="4.5" fill="#111827"/>
  <rect x="180" y="259" height="9" rx="4.5" fill="#8b5cf6" class="bar-purple"/>
  <text x="635" y="270" class="mono muted" font-size="13">30%</text>

  <text x="32" y="298" class="mono white" font-size="15" font-weight="700">CSS</text>
  <rect x="180" y="287" width="430" height="9" rx="4.5" fill="#111827"/>
  <rect x="180" y="287" height="9" rx="4.5" fill="#22c55e" class="bar-green"/>
  <text x="635" y="298" class="mono muted" font-size="13">15%</text>

  <text x="32" y="326" class="mono white" font-size="15" font-weight="700">HTML</text>
  <rect x="180" y="315" width="430" height="9" rx="4.5" fill="#111827"/>
  <rect x="180" y="315" height="9" rx="4.5" fill="#f97316" class="bar-orange"/>
  <text x="635" y="326" class="mono muted" font-size="13">10%</text>

  <text x="32" y="378" class="mono green" font-size="16" font-weight="700">$ gh stack</text>

  <text x="150" y="378" class="mono white" font-size="15" font-weight="700">
    React · Node.js · Express · PostgreSQL · APIs · Vercel · Render
  </text>

  <rect x="32" y="390" width="11" height="18" fill="#39ff88" class="cursor"/>
</svg>
