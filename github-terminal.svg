<svg width="980" height="500" viewBox="0 0 980 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      }

      .white {
        fill: #e6edf3;
      }

      .muted {
        fill: #8b949e;
      }

      .green {
        fill: #39ff88;
      }

      .cursor {
        animation: blink 1s infinite;
      }

      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <rect width="980" height="500" rx="14" fill="#0d1117"/>
  <rect x="1" y="1" width="978" height="498" rx="14" stroke="#30363d"/>

  <rect x="24" y="24" width="932" height="452" rx="10" fill="#030712"/>
