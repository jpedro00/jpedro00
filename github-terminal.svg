  <rect x="24" y="24" width="932" height="34" rx="10" fill="#05070a"/>
  <path d="M24 58H956" stroke="#30363d"/>

  <circle cx="48" cy="41" r="6" fill="#ff5f56"/>
  <circle cx="70" cy="41" r="6" fill="#ffbd2e"/>
  <circle cx="92" cy="41" r="6" fill="#27c93f"/>

